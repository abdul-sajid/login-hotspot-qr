<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Scanner Hotspot</title>
    
    <!-- PERBAIKAN UTAMA: Memanggil file script yang ada di dalam repositori sendiri -->
    <script src="html5-qrcode.min.js" type="text/javascript"></script>
    
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f6f9; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        #reader { width: 100%; border-radius: 8px; overflow: hidden; background: #eee; }
        .status { margin-top: 15px; font-weight: bold; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2>Pindai Voucher Wi-Fi</h2>
    <p>Izinkan akses kamera jika muncul permintaan prompt, lalu arahkan kamera ke QR Code</p>
    
    <div id="reader"></div>
    
    <div id="status" class="status">Menghubungkan ke Kamera...</div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const dstIp = urlParams.get('link') || "http://192.168.88.1"; 

    function onScanSuccess(decodedText, decodedResult) {
        document.getElementById('status').innerText = "QR Terdeteksi! Mengalihkan...";
        document.getElementById('status').style.color = "green";
        
        html5QrcodeScanner.clear();

        const loginUrl = `${dstIp}?username=${encodeURIComponent(decodedText)}&password=${encodeURIComponent(decodedText)}`;
        window.location.href = loginUrl;
    }

    function onScanFailure(error) {
        // Abaikan pencarian frame real-time
    }

    try {
        var html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { fps: 15, qrbox: {width: 250, height: 250} }, 
            /* verbose= */ false
        );
        
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        
        document.getElementById('status').innerText = "Kamera Siap. Silakan Scan.";
    } catch (e) {
        document.getElementById('status').innerText = "Gagal memuat kamera: " + e.message;
        document.getElementById('status').style.color = "red";
    }
</script>

</body>
</html>
